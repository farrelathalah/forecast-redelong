name: Forecast Redelong PR Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: forecast-redelong-pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run internal self-test
        run: |
          python weather_ensemble_multi_location.py \
            --mode self-test \
            --locations plta_redelong \
            --locations-file locations.json \
            --no-save-raw-payloads \
            --no-debug

      - name: Run all repository unit tests
        run: |
          python -m unittest discover -s tests -v
