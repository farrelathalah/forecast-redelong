name: Forecast Redelong

on:
  push:
    branches:
      - main
      - "feature/**"
      - "validation/**"
  workflow_dispatch:
    inputs:
      validate_only:
        description: "Build and validate without publishing to GitHub Pages"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 23,0,1 * * *"

permissions:
  contents: write

concurrency:
  group: forecast-redelong
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run internal self-test
        run: |
          python weather_ensemble_multi_location.py \
            --mode self-test \
            --locations plta_redelong \
            --locations-file locations.json \
            --no-save-raw-payloads \
            --no-debug

      - name: Clean outputs
        run: |
          rm -rf outputs
          mkdir -p outputs

      - name: Restore forecast archive from GitHub Pages
        run: |
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git worktree add --detach /tmp/forecast-gh-pages origin/gh-pages
            if [ -d /tmp/forecast-gh-pages/archive ]; then
              cp -a /tmp/forecast-gh-pages/archive outputs/
            fi
            if [ -d /tmp/forecast-gh-pages/validation_archive ]; then
              cp -a /tmp/forecast-gh-pages/validation_archive outputs/
            fi
            git worktree remove --force /tmp/forecast-gh-pages
          fi

      - name: Generate Redelong locations
        run: |
          python build_utils/make_redelong_locations.py
          python build_utils/fix_redelong_adm4.py

      - name: Run Redelong forecast
        run: |
          python weather_ensemble_multi_location.py \
            --mode forecast \
            --locations all \
            --locations-file locations.json \
            --timezone Asia/Jakarta \
            --sources BMKG,ECMWF,GFS,ICON,CMA,METEOFRANCE,UKMO \
            --per-hour \
            --forecast-range-days 4 \
            --http-timeout 20 \
            --max-retry-http 2 \
            --max-workers 2 \
            --max-inflight-per-host 1 \
            --disable-circuit-breaker \
            --no-aether-extra-vars \
            --disable-grid-sampling \
            --public-base-url "https://farrelathalah.github.io/forecast-redelong" \
            --no-save-raw-payloads \
            --no-debug

      - name: Build template pages
        run: |
          python redelong_portal_rebuild.py \
            --root outputs \
            --public-base-url "https://farrelathalah.github.io/forecast-redelong"

      - name: Patch legacy branding
        run: |
          python build_utils/patch_redelong_branding.py

      - name: Build Forecast Redelong public site
        run: |
          python build_utils/make_forecast_redelong_site.py

      - name: Build Forecast Redelong technical overview
        run: |
          python build_utils/make_forecast_redelong_overview.py

      - name: Enhance Forecast Redelong overview
        run: |
          python build_utils/enhance_forecast_redelong_overview.py

      - name: Add BMKG attribution
        run: |
          python build_utils/add_bmkg_attribution.py

      - name: Build operator-facing Redelong products
        run: |
          python build_utils/build_redelong_operational.py --outputs outputs

      - name: Build Redelong 3D globe and historical explorer
        run: |
          python build_utils/build_redelong_globe_history.py --outputs outputs

      - name: Build Besai Kemu forecast and historical explorer
        run: |
          python build_utils/build_besai_portal.py --outputs outputs

      - name: Build multi-site hydro network globe
        run: |
          python build_utils/build_multisite_catalog.py --outputs outputs

      - name: Refresh mature satellite validation proxies
        run: |
          python build_utils/refresh_validation_observations.py --outputs outputs

      - name: Evaluate forecast accuracy
        run: |
          python build_utils/evaluate_forecast_accuracy.py

      - name: Add evaluation link
        run: |
          python build_utils/link_evaluation_page.py

      - name: Apply shared FR interaction and rain atmosphere
        run: |
          python build_utils/apply_global_experience.py --outputs outputs

      - name: Validate publish quality gate
        run: |
          python build_utils/validate_redelong_publish.py --outputs outputs

      - name: Ensure nojekyll
        run: |
          touch outputs/.nojekyll

      - name: Upload validation preview
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.validate_only == true) || github.event_name == 'push' }}
        uses: actions/upload-artifact@v4
        with:
          name: forecast-redelong-validation-${{ github.run_number }}
          path: outputs
          retention-days: 7

      - name: Deploy to GitHub Pages branch
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.validate_only != true) || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./outputs
